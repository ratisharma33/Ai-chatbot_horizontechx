<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rati Sharma - AI FAQ Chatbot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-2xl h-[620px] bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl flex flex-col overflow-hidden">
        
        <div class="p-4 bg-slate-800/60 border-b border-slate-800 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="p-2.5 bg-indigo-600 text-white rounded-xl shadow-md">
                    <i data-lucide="code" class="w-5 h-5"></i>
                </div>
                <div>
                    <h2 class="font-bold text-base tracking-wide">Rati Sharma • AI Agent</h2>
                    <p class="text-xs text-slate-400">BCA Student @ Chandigarh University</p>
                </div>
            </div>
            <span class="px-2.5 py-1 bg-green-500/10 text-green-400 border border-green-500/20 text-xs font-semibold rounded-full animate-pulse">Task 2 Active</span>
        </div>

        <div id="chat-feed" class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-950/20">
            <div class="flex gap-3 max-w-[85%]">
                <div class="w-8 h-8 rounded-lg bg-slate-800 text-slate-300 flex items-center justify-center text-xs shrink-0">
                    <i data-lucide="bot" class="w-4 h-4"></i>
                </div>
                <div class="p-3.5 bg-slate-800 text-slate-100 border border-slate-700/50 rounded-2xl rounded-tl-none text-sm leading-relaxed">
                    Hi! I'm Rati's Portfolio Assistant. Ask me about my skills, technical projects, academic track, or my Deloitte internship experience!
                </div>
            </div>
        </div>

        <div class="px-4 pb-2 bg-slate-900 flex flex-wrap gap-2">
            <button onclick="sendSuggestion('What are your skills?')" class="text-xs bg-slate-950 hover:bg-slate-800 border border-slate-800 text-slate-400 px-3 py-1.5 rounded-lg">What are your skills?</button>
            <button onclick="sendSuggestion('Tell me about your projects')" class="text-xs bg-slate-950 hover:bg-slate-800 border border-slate-800 text-slate-400 px-3 py-1.5 rounded-lg">Tell me about your projects</button>
        </div>

        <form id="chat-form" onsubmit="handleMessageSubmit(event)" class="p-4 bg-slate-900 border-t border-slate-800/80 flex gap-2 items-center">
            <input type="text" id="user-input" placeholder="Ask about my technical background..." class="flex-1 bg-slate-950 border border-slate-800 focus:border-indigo-500 rounded-xl px-4 py-3 text-sm text-slate-200 focus:outline-none" required>
            <button type="submit" class="p-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl"><i data-lucide="send" class="w-4 h-4"></i></button>
        </form>
    </div>

    <script>
        lucide.createIcons();

        const FAQ_DATASET = [
            { keywords: ["hello", "hi", "skills", "languages"], response: "Rati Sharma is fluent in C++, Java, JavaScript, React.js, Tailwind CSS, and analytics tools like Tableau." },
            { keywords: ["projects", "sudoku", "geopulse"], response: "Key developments include 'GeoPulse' (a live climate tracker using NASA APIs) and an automated 9x9 Sudoku solver engine." },
            { keywords: ["deloitte", "experience", "internship"], response: "Rati completed a Data Analyst virtual internship sequence with Deloitte, modeling operational business metric views using Tableau." }
        ];

        function matchFAQ(input) {
            const tokens = input.toLowerCase().split(/\s+/);
            let bestResponse = "I can tell you about Rati's 'skills', 'projects', or 'Deloitte experience'!";
            let topScore = 0;

            FAQ_DATASET.forEach(item => {
                let score = 0;
                tokens.forEach(t => item.keywords.forEach(k => { if(k.includes(t) || t.includes(k)) score++; }));
                if(score > topScore) { topScore = score; bestResponse = item.response; }
            });
            return bestResponse;
        }

        function appendMessage(sender, text) {
            const feed = document.getElementById('chat-feed');
            const div = document.createElement('div');
            div.className = `flex gap-3 max-w-[85%] ${sender === 'user' ? 'ml-auto flex-row-reverse' : ''}`;
            div.innerHTML = `<div class="w-8 h-8 rounded-lg flex items-center justify-center shrink-0 text-xs font-bold bg-slate-800">${sender==='user'?'RS':'Bot'}</div><div class="p-3 bg-slate-800 rounded-2xl text-sm">${text}</div>`;
            feed.appendChild(div);
            feed.scrollTop = feed.scrollHeight;
        }

        function handleMessageSubmit(e) {
            e.preventDefault();
            const el = document.getElementById('user-input');
            if(!el.value.trim()) return;
            appendMessage('user', el.value);
            const reply = matchFAQ(el.value);
            setTimeout(() => appendMessage('bot', reply), 300);
            el.value = '';
        }

        function sendSuggestion(txt) { appendMessage('user', txt); setTimeout(() => appendMessage('bot', matchFAQ(txt)), 300); }
    </script>
</body>
</html>
